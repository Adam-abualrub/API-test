<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <h2 class="text-4xl">Input pokemon name</h2>
    <form onsubmit="getFormValues(event)">
        <input type="text" id="fname" name="fname"><br><br>
        <input type="submit" value="submit">
    </form>
    <p id="pokemon-id"></p>
    <div class="card" id="card">



        <div class="top-bar">
            <p id="type-pokemon">type</p>
            <p id="name-pokemon">name</p>
            <p id="hp-pokemon">HP</p>
        </div>



        <div class="pokemon-picture">
            <img id="image-pokemon" src="">
        </div>
        <div
            class="flex items-center justify-around flex-col gap-3 w-80 h-70 bg-white border-4 border-gray-800 rounded-lg mx-auto my-4 p-2">
            abilities:
            <div class="w-full flex justify-around flex-row  border-black">
                <div id="ability-name">ability-name</div>
                <div id="slot">slot</div>
            </div>
            <div class="w-full flex justify-around flex-row  border-black">
                <div id="ability-name-1">ability-name</div>
                <div id="slot-1">slot</div>
            </div>
        </div>




        <div class="data">
            <p id="atk-pokemon">Atk</p>
            <p id="def-pokemon">Def</p>
            <p id="speed-pokemon">speed</p>
        </div>



        <div class="data">
            <p id="Height-pokemon">Height</p>
            <p id="Weight-pokemon">Weight</p>
        </div>

    </div>

    <script>
        async function getFormValues(event) {
            event.preventDefault() //prevents the page from reloading

            const pokemon = document.getElementById('fname').value //grab the text in the input tag
            console.log(pokemon)

            const url = `https://pokeapi.co/api/v2/pokemon/${pokemon}`; //define the API url, combine name value in it
            console.log(url)
            const response = await fetch(url); //creates http GET request to API 
            if (response.ok) {
                console.log("ALL GOOD")
                const result = await response.json(); //convert result to JSON
                console.log(result)
                // console.log(result.id)
                // console.log(result.name)
                // console.log(result.height)
                // console.log(result.weight)
                // console.log(result.abilities[0].slot)
                // console.log(result.cries.latest)
                // console.log(result.stats[0].base_stat)
                // console.log(result.stats[1].base_stat)
                // console.log(result.stats[2].base_stat)
                // console.log(result.stats[5].base_stat)
                // console.log(result.sprites.front_default)
                console.log(result.abilities[0].ability.name)
                console.log(result.abilities[0].slot)
                console.log(result.abilities[1].ability.name)
                console.log(result.abilities[1].slot)
                console.log(typeof result.abilities[1].slot)

                // Display Data from the Object:
                document.getElementById("pokemon-id").innerHTML = ` ${pokemon} id is ${result.id} ${pokemon} height is ${result.height}  weight is ${result.weight}`

                //display/write pokemon name on card top middle

                document.getElementById("name-pokemon").innerHTML = ` ${result.name} `

                document.getElementById("hp-pokemon").innerHTML = ` hp:${result.stats[0].base_stat} `

                // if type is fire, then type icon is 🔥
                //if slot is 1, then repleace 1 with 1x type icon

                if (result.types[0].type.name == "fire") {
                    document.getElementById("card").style.backgroundColor = "red";
                    icon = `🔥`
                }
                else if (result.types[0].type.name == "normal") {
                    document.getElementById("card").style.backgroundColor = "grey";
                    icon = `⚙️`
                }
                else if (result.types[0].type.name == "water") {
                    document.getElementById("card").style.backgroundColor = "blue";
                    icon = `💧`
                }
                else if (result.types[0].type.name == "electric") {
                    document.getElementById("card").style.backgroundColor = "yellow";
                }
                else if (result.types[0].type.name == "grass") {
                    document.getElementById("card").style.backgroundColor = "green";
                }
                else if (result.types[0].type.name == "ice") {
                    document.getElementById("card").style.backgroundColor = "lightblue";
                }
                else if (result.types[0].type.name == "fighting") {
                    document.getElementById("card").style.backgroundColor = "darkred";

                }
                else if (result.types[0].type.name == "poison") {
                    document.getElementById("card").style.backgroundColor = "purple";
                }
                else if (result.types[0].type.name == "ground") {
                    document.getElementById("card").style.backgroundColor = "brown";
                }

                document.getElementById("type-pokemon").innerHTML = icon
                document.getElementById("slot").innerHTML = icon.repeat(result.abilities[0].slot);
                document.getElementById("slot-1").innerHTML = icon.repeat(result.abilities[1].slot);
                // //Grass = green
                // Ice = light - blue
                // Fighting = dark - red
                // Poison = purple
                // Ground = brown



                // if (result.abilities[0].slot == "1") {
                //     document.getElementById("card")
                //     document.getElementById("slot").innerHTML = `🔥`
                // }

                //  else if (result.abilities[0].slot == "1") {
                //     document.getElementById("card").style.backgroundColor = "red";
                //     document.getElementById("slot").innerHTML = `🔥`
                // }

                document.getElementById("Height-pokemon").innerHTML = ` height<br>${result.height} `

                document.getElementById("Weight-pokemon").innerHTML = ` weight<br>${result.weight} `

                document.getElementById("atk-pokemon").innerHTML = ` atk<br>${result.stats[1].base_stat} `

                document.getElementById("def-pokemon").innerHTML = ` def<br>${result.stats[2].base_stat} `

                document.getElementById("speed-pokemon").innerHTML = ` speed<br>${result.stats[5].base_stat} `

                document.getElementById("image-pokemon").src = `${result.sprites.front_default} `

                document.getElementById("ability-name").innerHTML = `${result.abilities[0].ability.name}`
                document.getElementById("ability-name-1").innerHTML = `${result.abilities[1].ability.name}`


                // document.getElementById("slot").innerHTML = `${result.abilities[0].slot} `
                // document.getElementById("ability-describtion").innerHTML = `${result.abilities[1].ability.url} `
            }
            else {
                alert("please input a valid pokemon name")
            }


        }
    </script>

</body>

</html>
